# Spring
spring.application.name=coupon-consumer
spring.config.import=optional:file:.env[.properties]
spring.main.web-application-type=none

# Datasource (MySQL) - api가 소유한 스키마에 붙기만 한다
spring.datasource.url=jdbc:mysql://localhost:3306/coupon_service?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.pool-name=CouponConsumerHikariCP

# Kafka (consumer)
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=coupon-issue
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=org.coupon.racecoupon.kafka
spring.kafka.listener.ack-mode=manual

# JPA / Hibernate (스키마·시드는 api 담당 → consumer는 관여하지 않음)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=never

# Logging
logging.level.root=INFO
logging.level.org.coupon.racecoupon=DEBUG
