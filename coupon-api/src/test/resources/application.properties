# 테스트 전용 설정 — 외부 MySQL/.env 의존 제거(H2 인메모리)
spring.application.name=coupon-api-test

# H2 인메모리 (MySQL 호환 모드)
spring.datasource.url=jdbc:h2:mem:coupon;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# data.sql 비활성 — 동시성 테스트는 @BeforeEach에서 직접 시드한다
spring.sql.init.mode=never

# Redis — RedisCouponIssueServiceTest / KafkaCouponIssueServiceTest가 사용(로컬 도커 필요)
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Kafka — KafkaCouponIssueServiceTest는 @EmbeddedKafka가 bootstrap을 주입(아래는 그 외 테스트용 기본값)
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Logging
logging.level.root=WARN
logging.level.org.coupon.racecoupon=INFO
