# Server
server.port=8080

# Spring
spring.application.name=gateway-service
spring.config.import=optional:file:.env[.properties]

# Gateway routes
spring.cloud.gateway.server.webflux.routes[0].id=coupon-api
spring.cloud.gateway.server.webflux.routes[0].uri=lb://coupon-api
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/v1/coupons/**

spring.cloud.gateway.server.webflux.routes[1].id=user-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://user-service
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/v1/auth/**,/api/v1/users/**

# Eureka (service discovery)
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

# JWT 검증용 비밀키(HS256, 최소 32바이트). user-service와 같은 값이어야 한다.
# 기본값을 두지 않는다: 기본값이 있으면 .env 없이도 저장소에 적힌 키로 조용히 기동해버리고,
# 그 키를 아는 사람은 누구나 ADMIN 토큰을 위조할 수 있다. 미설정이면 기동을 실패시킨다.
jwt.secret=${JWT_SECRET}

# Logging
logging.level.root=INFO
logging.level.org.coupon.gateway=DEBUG
logging.level.org.springframework.security=DEBUG
