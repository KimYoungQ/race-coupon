server:
  port: 8080

spring:
  application:
    name: gateway-service
  config:
    import: optional:file:.env[.properties]
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: coupon-api
              uri: lb://coupon-api
              predicates:
                - Path=/api/v1/coupons/**
            # 아래 라우트는 각 서비스가 생성되면 활성화한다.
            # - id: user-service
            #   uri: lb://user-service
            #   predicates:
            #     - Path=/api/v1/auth/**,/api/v1/users/**
            # - id: product-service
            #   uri: lb://product-service
            #   predicates:
            #     - Path=/api/v1/products/**

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

# JWT 검증용 비밀키(HS256, 최소 32바이트). 운영은 반드시 .env로 오버라이드.
jwt:
  secret: ${JWT_SECRET:dev-only-hs256-secret-please-override-in-env-min-32-bytes}

# 인증 없이 통과시킬 공개 경로(AntPath 패턴).
gateway:
  auth:
    public-paths:
      - /api/v1/auth/**
      - /v3/api-docs/**
      - /actuator/**

logging:
  level:
    root: INFO
    org.coupon.gateway: DEBUG
