# Server
server.port=${USER_SERVICE_PORT:8082}

# Spring
spring.application.name=user-service
spring.config.import=optional:file:.env[.properties]

# Datasource (MySQL) — Database per Service: coupon_service와 분리된 user_service 스키마
spring.datasource.url=jdbc:mysql://localhost:3306/user_service?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
# coupon-api는 create지만 여기는 계정이 재기동에도 살아남아야 하므로 update
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Eureka (service discovery) — 게이트웨이가 lb://user-service 로 발견
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

# JWT — 게이트웨이와 반드시 같은 값이어야 한다. 게이트웨이가 이 키로 서명을 검증한다.
# 기본값을 두지 않는다: 기본값이 있으면 .env 없이도 저장소에 적힌 키로 토큰을 발급해버린다.
jwt.secret=${JWT_SECRET}
# 유효 시간(초): Access 30분, Refresh 7일
jwt.access-token-validity=1800
jwt.refresh-token-validity=604800

# Logging
logging.level.root=INFO
logging.level.org.coupon.userservice=DEBUG
logging.level.org.springframework.security=DEBUG
